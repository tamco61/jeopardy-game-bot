# docker-compose.yml — Локальная разработка «Своей Игры»
#
# Запуск:  docker compose up -d
# Стоп:    docker compose down
# С очисткой данных: docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: jeopardy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret}
      POSTGRES_DB: ${POSTGRES_DB:-jeopardy_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeopardy"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI (http://localhost:15672)

  poller:
    build: .
    command: ["uv", "run", "python", "-m", "src.apps.poller.main"]
    depends_on:
      - rabbitmq
    env_file: .env
    restart: unless-stopped

  worker:
    build: .
    command: ["uv", "run", "python", "-m", "src.apps.worker.main"]
    depends_on:
      - rabbitmq
    env_file: .env
    restart: unless-stopped

  core:
    build: .
    command: ["uv", "run", "python", "-m", "src.apps.core.main"]
    depends_on:
      - postgres
      - redis
      - rabbitmq
    env_file: .env
    restart: unless-stopped

  proxy:
    build: .
    command: ["uv", "run", "python", "-m", "src.apps.proxy.main"]
    depends_on:
      - rabbitmq
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

volumes:
  pgdata:
